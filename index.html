<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <main class="main-content">
        <header class="hero" id="statusOverviewSection">
          <div class="hero-main">
            <div class="hero-title-row">
              <h1 id="heroTitle"></h1>
            </div>
          </div>
          <div class="hero-top-meta">
            <div class="date-shortcuts" id="dateShortcuts">
              <button type="button" class="date-shortcut is-active" data-offset="-1"></button>
              <button type="button" class="date-shortcut" data-offset="-2"></button>
              <button type="button" class="date-shortcut" data-offset="-3"></button>
            </div>
            <label class="date-card" for="datePicker">
              <span id="dateCardLabel" class="date-card-label"></span>
              <strong id="todayLabel"></strong>
              <input id="datePicker" type="date" aria-label="" />
            </label>
          </div>
          <div class="hero-summary" id="heroSummary"></div>
        </header>

        <div class="dashboard-grid">
          <section class="panel panel-overview" id="overviewSection">
            <div class="panel-header">
              <div id="overviewHeading" class="panel-heading-richtext"></div>
            </div>

            <div class="metric-grid" id="overviewMetrics" aria-live="polite"></div>

            <div class="daily-report-layout">
              <div id="teamDailyList" class="section-richtext narrative-summary" aria-live="polite"></div>
            </div>
          </section>

          <section class="panel panel-member" id="memberSection">
            <div class="panel-header">
              <div id="memberHeading" class="panel-heading-richtext"></div>
            </div>
            <div>
              <div id="memberAlignedRows" class="member-aligned-rows"></div>
            </div>
          </section>

          <section class="panel panel-risk" id="riskSection">
            <div class="panel-header">
              <div id="riskHeading" class="panel-heading-richtext"></div>
            </div>
            <div id="riskBoard" class="risk-board" aria-live="polite"></div>
          </section>

          <section class="panel panel-crm" id="crmSection">
            <div class="panel-header">
              <div id="crmHeading" class="panel-heading-richtext"></div>
            </div>
            <div class="crm-tabs" role="tablist" aria-label="客户商机视图切换">
              <button class="crm-tab is-active" type="button" role="tab" aria-selected="true" data-crm-tab="detail">客户商机详情</button>
              <button class="crm-tab" type="button" role="tab" aria-selected="false" data-crm-tab="full">全量客户与商机表</button>
              <button class="crm-tab" type="button" role="tab" aria-selected="false" data-crm-tab="activity">销售动态</button>
            </div>
            <div class="crm-panels">
              <section class="crm-panel is-active" data-crm-panel="detail" role="tabpanel">
                <div class="crm-sections">
                  <section class="crm-block">
                    <div class="card-header">
                      <h3 id="crmOverallTitle"></h3>
                    </div>
                    <div class="table-wrap">
                      <table>
                        <thead>
                          <tr id="crmOverallHead"></tr>
                        </thead>
                        <tbody id="crmOverallTableBody"></tbody>
                      </table>
                    </div>
                  </section>

                  <section class="crm-block">
                    <div class="card-header">
                      <h3 id="crmCustomerTitle"></h3>
                    </div>
                    <div class="table-wrap">
                      <table>
                        <thead>
                          <tr id="crmCustomerHead"></tr>
                        </thead>
                        <tbody id="crmCustomerTableBody"></tbody>
                      </table>
                    </div>
                  </section>

                  <section class="crm-block">
                    <div class="card-header">
                      <h3 id="crmOpportunityTitle"></h3>
                    </div>
                    <div class="table-wrap">
                      <table>
                        <thead>
                          <tr id="crmOpportunityHead"></tr>
                        </thead>
                        <tbody id="crmOpportunityTableBody"></tbody>
                      </table>
                    </div>
                  </section>
                </div>
              </section>

              <section class="crm-panel" data-crm-panel="full" role="tabpanel" hidden>
                <div class="crm-block">
                  <div class="card-header">
                    <h3 id="crmFullTitle">全量客户与商机表</h3>
                  </div>
                  <div class="table-wrap">
                    <table>
                      <thead>
                        <tr id="crmFullHead"></tr>
                      </thead>
                      <tbody id="crmFullTableBody"></tbody>
                    </table>
                  </div>
                </div>
              </section>

              <section class="crm-panel" data-crm-panel="activity" role="tabpanel" hidden>
                <div class="crm-block">
                  <div class="card-header">
                    <h3 id="salesActivityTitle">销售动态</h3>
                  </div>
                  <div id="salesActivityFeed" class="activity-feed" aria-live="polite"></div>
                </div>
              </section>
            </div>
          </section>
        </div>
      </main>
    </div>

        <div class="chat-widget" id="chatWidget">
      <section class="chat-panel" id="chatPanel" hidden aria-label="AI 助手">
        <header class="chat-header">
          <div class="chat-brand">
            <div class="chat-brand-icon" aria-hidden="true"><span></span></div>
            <div>
              <strong id="chatWidgetTitle">AI 助手</strong>
            </div>
          </div>
          <button id="chatClose" class="chat-close" type="button" aria-label="关闭 AI 助手">×</button>
        </header>

        <div id="chatMessages" class="chat-messages" aria-live="polite"></div>
        <form id="chatForm" class="chat-form">
          <input
            id="chatInput"
            class="chat-input"
            type="text"
            placeholder="例如：今年目标还差多少？哪些 B 级客户超过 15 天未跟进？"
            autocomplete="off"
          />
          <button id="chatSubmit" class="chat-submit" type="submit" aria-label="发送消息" disabled>
            <svg viewBox="0 0 1024 1024" fill="none" aria-hidden="true">
              <path
                d="M880.554667 130.901333a42.666667 42.666667 0 0 1 56.832 50.090667l-170.666667 682.666667a42.666667 42.666667 0 0 1-71.552 19.84l-178.56-178.602667L418.133333 836.266667a42.666667 42.666667 0 0 1-74.581333-12.117334l-79.786667-239.232-154.88-77.397333a42.666667 42.666667 0 0 1 3.669334-77.952l768-298.666667zM233.130667 474.154667l84.608 42.325333 3.669333 2.133333a42.666667 42.666667 0 0 1 17.706667 22.570667l59.605333 178.730667 56.96-75.946667-16.512-16.469333a42.666667 42.666667 0 0 1 0-60.330667l170.666667-170.666667a42.666667 42.666667 0 1 1 60.330666 60.330667L529.664 597.333333l172.544 172.544 132.437333-529.578666-601.514666 233.856z"
                fill="currentColor"
              ></path>
            </svg>
          </button>
        </form>
      </section>

      <button
        id="chatToggle"
        class="chat-toggle"
        type="button"
        aria-label="打开对话助手"
        aria-expanded="false"
        aria-controls="chatPanel"
      >
        <img class="chat-toggle-icon chat-toggle-message" src="./chat.svg" alt="" aria-hidden="true" />
        <svg
          class="chat-toggle-icon chat-toggle-chevron"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M7 10l5 5 5-5"></path>
        </svg>
      </button>
    </div>    <script src="./app.js"></script>
  </body>
</html>
